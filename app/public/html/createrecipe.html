<!DOCTYPE html>
<html>
    <head>
        <title>Recipes 4 Students</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <script src="../js/createrecipe.js" defer></script>
        <script src="../js/main.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Recipes 4 Students</h1>
            <div class="dropdown">
                <button id="login_link" href="#">Username <i class="fa fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a id="logout_btn" href="../html/login.html">Log out</a>
                </div>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="../html/index.html">Home</a></li>
                <li><a href="../html/posts.html">Trending Recipes</a></li>
                <li><a href="../html/my_recipes.html">My Recipes</a></li>
                <li class="active"><a href="../html/createrecipe.html">Publish A Recipe</a></li>
                <li><a href="../html/payment.html">Subscribe!</a></li>
            </ul>
        </nav>

        <main>
            <section>
                <h2>Share your culinary wisdom</h2>
                <p>Give your fellow students some new ideas</p>

                <form id="recipe_form">
                    <fieldset>
                        <legend>Compose a Post</legend>
                            <label for="title_input">Recipe Title:</label>
                            <input id="title_input" name="title_input" type="text" placeholder="Enter recipe title..." required>

                            <label for="summary_input">Recipe Summary:</label>
                            <textarea id="summary_input" name="summary_input" placeholder="Write your method here..." required></textarea>

                            <label for="image_url_input">Image URL:</label>
                            <input type="url" id="image_url_input" name="image_url_input" placeholder="Enter image URL..."/>

                            <label for="content_input">Content:</label>
                            <textarea id="content_input" name="content_input" placeholder="Write your recipe here..." required></textarea>

                            <label for="subscriber_only_input"></label>
                            <input type="checkbox" id="subscriber_only_input" name="subscriber_only_input"/>
                            
                            <button type="submit">Publish your recipe!</button>
                    </fieldset>
                </form>
            </section>
        </main>
    </body>
</html>
