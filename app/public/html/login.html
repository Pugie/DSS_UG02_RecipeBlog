<!DOCTYPE html>
<html>
    <head>
        <title> Recipes 4 Students Blog Login</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/login.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Welcome to Recipes 4 Students!</h1>
        </header>
        <main>
        <p>Please enter your details to continue.</p>

        <form id="login_form">
            <label for="username_input">Email Address:</label>
            <input type="email" id="email_input" name="username_input" placeholder="Please enter your email address..." required>

            <label for="password_input">Password:</label>
            <input type="password" id="password_input" name="password_input" placeholder="Please enter your password..." required>

            <button id="login_btn" type="submit">Log In</button>
        </form>
        <p id="message"></p>

        <p>Don't have an account yet? Sign up <a href="../html/signup.html">here!</a></p>
        </main>
    </body>
</html>
