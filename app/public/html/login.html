<!DOCTYPE html>
<html>
    <head>
        <title> Recipes 4 Students Blog Login</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/login.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Welcome to Recipes 4 Students!</h1>
        </header>
        <main>
        <p>Please enter your details to continue.</p>

        <form method="post" action="/" id="login_form">
            <label for="username_input">Username:</label>
            <input type="text" id="username_input" name="username_input" placeholder="Please enter your username..." required>

            <label for="password_input">Password:</label>
            <input type="password" id="password_input" name="password_input" placeholder="Please enter your password..." required>

            <button id="login_btn" type="submit">Log in</button>
        </form>
        </main>
    </body>
</html>
