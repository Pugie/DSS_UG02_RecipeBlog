<!DOCTYPE html>
<html>
    <head>
        <title> Recipes 4 Students Blog Signup</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/signup.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Welcome to Recipes 4 Students!</h1>
        </header>
        <main>
        <p>Sign up to the UK's biggest student recipe sharing site!</p>

        <form id="signup_form">
            <label for="username_input">Username:</label>
            <input type="text" id="username_input" name="username_input" placeholder="Enter Username..." required>

            <label for="email_input">Email Address:</label>
            <input type="email" id="email_input" name="email_input" placeholder="Enter email address..." required>

            <label for="password_input">Password:</label>
            <input type="password" id="password_input" name="password_input" placeholder="Enter Password..." required>

            <label for="password_input">Confirm password:</label>
            <input type="password" id="conf_password_input" name="confirm_password_input" placeholder="Confirm Password..." required>

            <button id="signup_btn" type="submit">Sign Up!</button>
        </form>
        <p id="message"></p>

        <p>Already have an account? Login <a href="../html/login.html">here!</a></p>
        </main>
    </body>
</html>
