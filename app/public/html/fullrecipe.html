<!--So when a user presses the Full Recipe button, they are taken here-->

<!DOCTYPE html>
<html>
    <head>
        <title> Recipes 4 Students </title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <script src="../js/fullrecipe.js" defer></script>
        <script src="../js/main.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Recipes 4 Students</h1>
            <div class="dropdown">
                <button id="login_link" href="#">Username <i class="fa fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a id="logout_btn" href="../html/login.html">Log Out</a>
                </div>
            </div>
        </header>

        <nav>
            <ul>
                <li class="active"><a href="../html/index.html">Home</a></li>
                <li><a href="../html/posts.html">Trending Recipes</a></li>
                <li><a href="../html/my_recipes.html">My Recipes</a></li>
                <li><a href="../html/createrecipe.html">Publish A Recipe</a></li>
                <li><a href="../html/payment.html">Subscribe!</a></li>
            </ul>
        </nav>

        <main>
            <section id="postList">
                <!--This should show the specific post-->

            </section>

            <section>
                <h2>Comments</h2>
                <p>Let the author know how you found this recipe</p>

                <form action="/makecomment" method="post" id="commentForm" name="commentForm">
                    <fieldset>
                        <legend>Write a comment</legend>
                            <label for="content_field">You say:</label>
                            <textarea id="content_field" name="content_field" placeholder="Comment here..." required></textarea>
                            <!-- <input id="content_field" name="content_field" type="text"> -->

                            <input id="postId" name="postId" type="hidden">
                            <input id="commentId" name="commentId" type="hidden">
                            
                            <button type="submit" id="post_button">Post Comment</button>
                    </fieldset>
                </form>
            </section>
            
            <section id="commentList">
                <!--And this should list all the comments for this post-->
            </section>
        </main>
    </body>
</html>
